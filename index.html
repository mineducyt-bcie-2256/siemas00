<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Monitoreo MINEDUCYT – BCIE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* ══════════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════════ */
:root{
  --navy:      #0a1628;
  --navy2:     #0f2044;
  --blue:      #1a3a6b;
  --accent:    #2563eb;
  --accent2:   #3b82f6;
  --green:     #10b981;
  --green2:    #059669;
  --white:     #ffffff;
  --gray50:    #f8fafc;
  --gray100:   #f1f5f9;
  --gray200:   #e2e8f0;
  --gray400:   #94a3b8;
  --gray600:   #475569;
  --gray800:   #1e293b;
  --radius:    8px;
  --tr:        all .22s ease;
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; background:var(--gray100); color:var(--gray800); }

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.app{ display:grid; height:100vh;
  grid-template-rows: 60px 1fr;
  grid-template-columns: 320px 1fr;
  grid-template-areas:
    "topbar topbar"
    "sidebar main";
}

/* ══════════════════════════════════════════
   TOP BAR (Mejora 1 y 2)
══════════════════════════════════════════ */
.topbar{
  grid-area:topbar;
  background: var(--white);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; border-bottom:1px solid var(--gray200); z-index:1100;
}
.topbar-left{ display:flex; flex-direction:column; }
.topbar-title h1{ color:var(--navy); font-size:1.1rem; font-weight:800; }
.topbar-title p { color:var(--accent); font-size:.85rem; font-weight:600; margin-top:2px; }

.topbar-right{ display:flex; align-items:center; gap:12px; }
.btn-top{
  display:flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius:6px; font-size:.75rem; font-weight:600;
  border:none; cursor:pointer; transition:var(--tr);
}
.btn-export-map  { background:var(--navy); color:white; }
.btn-export-xlsx { background:var(--gray100); color:var(--gray800); border:1px solid var(--gray200); }
.btn-top:hover{ opacity:0.9; transform:translateY(-1px); }

/* ══════════════════════════════════════════
   SIDEBAR (Mejora 3, 5 y 6)
══════════════════════════════════════════ */
.sidebar{
  grid-area:sidebar;
  background: var(--white);
  display:flex; flex-direction:column;
  border-right:1px solid var(--gray200);
}

.sb-tabs{ display:flex; background:var(--gray50); border-bottom:1px solid var(--gray200); }
.sb-tab{
  flex:1; padding:12px; text-align:center; cursor:pointer;
  font-size:.7rem; font-weight:700; text-transform:uppercase;
  color:var(--gray400); transition:var(--tr);
}
.sb-tab.active{ color:var(--accent); border-bottom:2px solid var(--accent); background:white; }

.sb-panel{ display:none; flex:1; overflow-y:auto; padding:20px; background: white; }
.sb-panel.active{ display:flex; flex-direction:column; gap:18px; }

/* Tarjetas Ejecutivas (Mejora 3) */
.stats-stack{ display:flex; flex-direction:column; gap:12px; }
.s-card-exec{
  padding:16px; border-radius:var(--radius);
  background: var(--gray50);
  border: 1px solid var(--gray200);
  display: flex; flex-direction: column; justify-content: center;
}
.s-card-exec .s-num { font-size:1.8rem; font-weight:800; color:var(--navy); line-height:1; }
.s-card-exec .s-lbl { font-size:.7rem; text-transform:uppercase; font-weight:700; color:var(--gray600); margin-top:6px; letter-spacing:0.5px; }

/* Estilos de inputs y filtros */
.sec-label{ font-size:.65rem; font-weight:800; text-transform:uppercase; color:var(--gray400); margin-bottom:4px; }
.search-wrap input, select.fi-select {
  width:100%; padding:10px; border-radius:6px; border:1px solid var(--gray200); background:var(--gray50); font-size:.8rem;
}
.fi { margin-bottom: 12px; }
.fi-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.fi-head span { font-size:0.75rem; font-weight:700; color: var(--gray800); }

/* ══════════════════════════════════════════
   MAPA & TABLA
══════════════════════════════════════════ */
.main{ grid-area:main; display:grid; grid-template-rows: 1fr auto; position:relative; }
#map{ width:100%; height:100%; z-index:1; }

.tabla-panel{ background:var(--white); border-top:1px solid var(--gray200); height:250px; display:flex; flex-direction:column; }
.tabla-top{ padding:10px 20px; display:flex; align-items:center; justify-content:space-between; background:var(--gray50); border-bottom:1px solid var(--gray200); }
.t-title { font-size: .8rem; font-weight: 700; color: var(--navy); }

/* Export Canvas Styles */
#export-container { position: absolute; left: -9999px; top: 0; background: white; padding: 20px; }
.export-header { margin-bottom: 15px; border-bottom: 2px solid var(--navy); padding-bottom: 10px; }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">
        <h1>Monitoreo de Condiciones Ambientales y Sociales</h1>
        <p>Programa Mi Nueva Escuela MINEDUCYT BCIE 2256</p>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-top btn-export-map" onclick="exportarMapaPro()">🗺️ Exportar Imagen Mapa</button>
      <button class="btn-top btn-export-xlsx" onclick="exportarExcel()">📊 Excel</button>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sb-tabs">
      <div class="sb-tab active" onclick="switchTab('stats')" id="tab-stats">Resumen</div>
      <div class="sb-tab" onclick="switchTab('filtros')" id="tab-filtros">Filtros</div>
      <div class="sb-tab" onclick="switchTab('graficos')" id="tab-graficos">Análisis</div>
    </div>

    <div class="sb-panel active" id="panel-stats">
      <div class="stats-stack">
        <div class="s-card-exec">
          <span class="s-num" id="s-total">0</span>
          <span class="s-lbl">Total Centros Educativos</span>
        </div>
        <div class="s-card-exec">
          <span class="s-num" id="s-mapa">0</span>
          <span class="s-lbl">Ubicaciones en Mapa</span>
        </div>
        <div class="s-card-exec">
          <span class="s-num" id="s-analisis">0</span>
          <span class="s-lbl">Indicadores Activos</span>
        </div>
      </div>

      <div style="margin-top:20px">
        <div class="sec-label">🔎 Búsqueda Rápida</div>
        <input type="text" id="busqueda" placeholder="Nombre o código..." oninput="debouncedFiltros()">
      </div>
    </div>

    <div class="sb-panel" id="panel-filtros">
      <div id="filtros-din"></div>
      <button style="width:100%; padding:10px; cursor:pointer;" onclick="limpiarTodo()">Limpiar Filtros</button>
    </div>

    <div class="sb-panel" id="panel-graficos">
        <div id="contenedor-graficos"></div>
    </div>
  </aside>

  <div class="main">
    <div id="map"></div>
    <div class="tabla-panel">
        <div class="tabla-top">
            <div class="t-title">Listado de Centros <span id="t-count" style="color:var(--accent)"></span></div>
        </div>
        <div style="overflow:auto; flex:1;">
            <table id="tabla-datos" style="width:100%; border-collapse:collapse; font-size:0.75rem;">
                <thead id="tabla-thead" style="background:var(--navy); color:white; position:sticky; top:0;"></thead>
                <tbody id="tabla-body"></tbody>
            </table>
        </div>
    </div>
  </div>
</div>

<div id="export-container">
    <div class="export-header">
        <h2 id="exp-titulo">Mapa de Monitoreo</h2>
        <p id="exp-sub">Filtros aplicados: <span id="exp-filtros">Ninguno</span></p>
    </div>
    <div id="map-capture" style="width:1200px; height:800px;"></div>
</div>

<script>
// --- Configuración y Estado ---
const ARCHIVO = "bdatos_bcie26.xlsx";
let mapa, clusterCapa;
let datosBrutos = [];
let datosActuales = [];
let filtrosActivos = {};

// --- Inicialización ---
window.onload = () => {
    iniciarMapa();
    cargarDatos();
};

function iniciarMapa() {
    mapa = L.map('map').setView([13.794, -88.896], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
    clusterCapa = L.markerClusterGroup().addTo(mapa);
}

async function cargarDatos() {
    try {
        const res = await fetch(ARCHIVO);
        const buf = await res.arrayBuffer();
        const wb = XLSX.read(buf, {type:'array'});
        datosBrutos = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        datosActuales = [...datosBrutos];
        
        actualizarUI();
        crearFiltrosDinamicos();
    } catch (e) { console.error("Error cargando Excel", e); }
}

// --- Mejora 4: Exportación Pro ---
async function exportarMapaPro() {
    const btn = document.querySelector('.btn-export-map');
    btn.innerText = "Generando...";
    
    // Obtener filtros actuales para el título
    const filtrosTxt = Object.entries(filtrosActivos)
        .filter(([k,v]) => v !== "")
        .map(([k,v]) => `${k}: ${v}`).join(' | ') || "Todos los centros";

    document.getElementById('exp-titulo').innerText = "Programa Mi Nueva Escuela MINEDUCYT BCIE 2256";
    document.getElementById('exp-filtros').innerText = filtrosTxt;

    // Usamos html2canvas sobre el contenedor del mapa directamente para evitar desplazamiento de puntos
    const mapaElemento = document.getElementById('map');
    
    html2canvas(mapaElemento, {
        useCORS: true,
        allowTaint: true,
        ignoreElements: (node) => node.classList.contains('leaflet-control-container')
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = `Mapa_MINEDUCYT_${Date.now()}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
        btn.innerText = "🗺️ Exportar Imagen Mapa";
    });
}

// --- Lógica de Filtros y UI ---
function crearFiltrosDinamicos() {
    const campos = ["Departamento", "Etapa", "Empresa obras"];
    const cont = document.getElementById('filtros-din');
    
    campos.forEach(campo => {
        const opciones = [...new Set(datosBrutos.map(d => d[campo]))].sort();
        const div = document.createElement('div');
        div.className = 'fi';
        div.innerHTML = `
            <div class="fi-head"><span>${campo}</span></div>
            <select class="fi-select" onchange="filtrar('${campo}', this.value)">
                <option value="">Ver Todos</option>
                ${opciones.map(o => `<option value="${o}">${o}</option>`).join('')}
            </select>
        `;
        cont.appendChild(div);
    });
}

function filtrar(campo, valor) {
    filtrosActivos[campo] = valor;
    ejecutarFiltros();
}

function ejecutarFiltros() {
    const busq = document.getElementById('busqueda').value.toLowerCase();
    
    datosActuales = datosBrutos.filter(d => {
        const cumpleBusq = !busq || JSON.stringify(d).toLowerCase().includes(busq);
        const cumpleFiltros = Object.entries(filtrosActivos).every(([k, v]) => !v || d[k] === v);
        return cumpleBusq && cumpleFiltros;
    });

    actualizarUI();
}

function actualizarUI() {
    document.getElementById('s-total').innerText = datosBrutos.length;
    document.getElementById('s-mapa').innerText = datosActuales.length;
    document.getElementById('t-count').innerText = `(${datosActuales.length})`;
    
    // Actualizar Mapa
    clusterCapa.clearLayers();
    datosActuales.forEach(d => {
        if(d.Latitud && d.Longitud) {
            L.circleMarker([d.Latitud, d.Longitud], {radius: 8, color: '#2563eb', fillOpacity: 0.8})
             .bindPopup(`<b>${d['Centro Educativo']}</b><br>${d.Código}`)
             .addTo(clusterCapa);
        }
    });

    // Actualizar Tabla
    const tbody = document.getElementById('tabla-body');
    tbody.innerHTML = datosActuales.slice(0, 50).map(d => `
        <tr>
            <td style="padding:8px; border-bottom:1px solid #eee;">${d.Código || ''}</td>
            <td style="padding:8px; border-bottom:1px solid #eee;">${d['Centro Educativo'] || ''}</td>
            <td style="padding:8px; border-bottom:1px solid #eee;">${d.Departamento || ''}</td>
        </tr>
    `).join('');
}

function switchTab(id) {
    document.querySelectorAll('.sb-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sb-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    document.getElementById('panel-'+id).classList.add('active');
}

const debouncedFiltros = () => {
    clearTimeout(window.t);
    window.t = setTimeout(ejecutarFiltros, 300);
};

function limpiarTodo() {
    document.querySelectorAll('select').forEach(s => s.value = "");
    document.getElementById('busqueda').value = "";
    filtrosActivos = {};
    ejecutarFiltros();
}
</script>
</body>
</html>
